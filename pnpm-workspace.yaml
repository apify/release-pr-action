# GitHub Packages serves tarballs from /download/<scope>/<name>/<ver>/<sha>, not the
# /-/<name>-<ver>.tgz path that pnpm infers when only the integrity hash is in the lockfile.
# Recording the exact tarball URL pnpm got from the registry keeps cold-store CI installs
# from 404'ing on @apify-packages tarballs.
lockfileIncludeTarballUrl: true
minimumReleaseAge: 1440 # 24 hours
strictDepBuilds: false
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 43200 # 30 days
